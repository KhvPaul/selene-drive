version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE_ENV=dev
    environment:
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    depends_on:
      - database
    ports:
      - '${WEB_PORT:-8000}:8000'
    networks:
      - internal-network
    volumes:
      - .:/home/appuser/app
    command: sh docker/runserver.sh

  database:
    container_name: postgres
    image: postgres:17.5
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    expose:
      - 5432
    networks:
      - internal-network
    volumes:
      - database-data:/var/lib/postgresql/data

volumes:
  database-data:

networks:
  internal-network:
